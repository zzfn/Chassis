name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  # ── Rust 二进制（双架构并行）─────────────────────────────────────────────
  build-rust:
    name: Rust (${{ matrix.artifact }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: deeptank-linux-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: deeptank-linux-arm64
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: 编译 Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: 重命名产物
        run: cp target/${{ matrix.target }}/release/deeptank ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── 创建 GitHub Release（仅 tag 触发）────────────────────────────────────
  release:
    name: Release
    needs: [build-rust]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: 发布 Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            deeptank-linux-amd64
            deeptank-linux-arm64
